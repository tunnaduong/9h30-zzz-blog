media:
  input: src/assets/images
  output: src/assets/images
content:
  - name: posts
    type: collection
    path: src/data/blog
    fields:
      - name: title
        label: Title
        type: string
      - name: author
        label: Author
        type: string
      - name: description
        label: Description
        type: text
      - name: draft
        label: Is draft?
        type: boolean
        default: true
      - name: featured
        label: Is featured?
        type: boolean
        default: false
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true  # Cho phép chọn nhiều tag cùng lúc
          create: true    # CHO PHÉP TỰ GÕ VÀO TAG MỚI nếu không có trong danh sách
          values:         # Danh sách các tag gợi ý sẵn có
            - Công nghệ
            - Lập trình
            - Chuyện đời
            - Linh tinh
            - Tâm sự mỏng
            - Review
            - Nấu nướng
            - Hành trình tự lập
      - name: pubDatetime
        label: Published Datetime
        type: date
        options: 
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ss'+07:00'"
      - name: heroImage
        label: Hero Image
        type: image
      - name: body
        label: Body
        type: rich-text
    view:
      fields: [title, description, pubDatetime, heroImage]
    filename: "{primary}.md"